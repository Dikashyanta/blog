<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #333;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        text-align: center;
    }

    h1 {
        font-size: 6rem;
        color: #ff4d4d;
    }

    p {
        font-size: 1.2rem;
        margin: 15px 0 25px;
    }

    a {
        display: inline-block;
        text-decoration: none;
        background: #333;
        color: white;
        padding: 12px 24px;
        border-radius: 5px;
        transition: background 0.3s;
    }

    a:hover {
        background: #555;
    }
</style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <a href="/">Go Home</a>
</div>

</body>
</html>
